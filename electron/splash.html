<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NewsPapersHub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
    }
    .logo {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #c9a94e, #f0d78c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(201, 169, 78, 0.2);
      border-top-color: #c9a94e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 0.95rem;
      color: #888;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">NewsPapersHub</div>
    <div class="spinner"></div>
    <p class="status">Connecting to backend service...</p>
  </div>
</body>
</html>

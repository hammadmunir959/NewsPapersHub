name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'latest'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Bundle Python Backend
        run: |
          pyinstaller --onefile --name newspapershub-backend --clean --add-data "app:app" --collect-all uvicorn --collect-all fastapi service_entry.py
          mkdir -p electron/bin
          mv dist/newspapershub-backend electron/bin/
          cp .env electron/bin/ || echo "No .env found"

      - name: Build Flutter Web UI
        run: |
          cd ui/flutter-apps
          flutter build web --release
          cd ../..
          mkdir -p electron/web
          cp -r ui/flutter-apps/build/web/* electron/web/

      - name: Build Electron App
        run: |
          cd electron
          npm install
          npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Packages
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            electron/dist/*.AppImage
            electron/dist/*.deb
